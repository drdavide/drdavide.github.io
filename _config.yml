# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Davide D'Amico
email: mailto:drdavide@gmai.com
description: >- # this means to ignore newlines until "baseurl:"
  My journey into web development
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://drdavide.github.io" # the base hostname & protocol for your site, e.g. http://example.com

github_username: drdavide

show_excerpts: true
permalink: /:collection/:year-:month-:day-:title:output_ext

# staticman url for comments, to be done:
# staticman_url: "https://sdosda-staticman.herokuapp.com/v3/entry/github/simondosda/SimonDosda.github.io/main/comments"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-target-blank
  - jekyll-sitemap

# Fields minima uses, but are not defaulted with the Jekyll new command.
# Author is the default for posts, the atom feed, and is used in the footer 
author: Davide D'Amico
linkedin_username: davide~damico
youtube_username: DavideDAmico

# New fields not defaulted by Jekyll-new with minima theme
# Add a copyright. A copyright symbol and year will be added automatically
# copyright: company name, Inc.
copyright: Davide D'Amico
# title-logo is a new field that, when used, displays a logo 
# instead of custom text. Ideally, image is 50px high and takes up
# minimal horizontal space. Tested with a new root "images" folder e.g.:
# title-logo: /img/my-logo.png (or JPG, etc.)
# title-logo: /img/logo.png

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
   - .sass-cache/
   - .jekyll-cache/
   - gemfiles/
   - Gemfile
   - Gemfile.lock
   - node_modules/
   - vendor/bundle/
   - vendor/cache/
   - vendor/gems/
   - vendor/ruby/